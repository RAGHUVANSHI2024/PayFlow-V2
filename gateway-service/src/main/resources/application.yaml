server:
  port: 8080

spring:
  application:
    name: GATEWAY-SERVICE

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            - id: wallet=service
              uri: lb://WALLET-SERVICE
              predicates:
                - Path=/api/v1/wallets/**, /api/v1/transaction/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka