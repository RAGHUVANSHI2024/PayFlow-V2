services:

  redis:
    image: redis:7
    container_name: payflow-redis
    ports:
      - "6379:6379"

  eureka-server:
    image: payflow-eureka
    container_name: payflow-eureka
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ports:
      - "8761:8761"

  config-server:
    image: payflow-config
    container_name: payflow-config
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    ports:
      - "8888:8888"

  mysql:
    image: mysql:8.0
    container_name: payflow-mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-pmysql" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: payflow_auth
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  auth-service:
    image: payflow-auth
    container_name: payflow-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://payflow-config:8888

  user-service:
    image: payflow-user
    container_name: payflow-user
    restart: unless-stopped
    ports:
      - "8082:8082"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://payflow-config:8888

  wallet-service:
    image: payflow-wallet
    container_name: payflow-wallet
    restart: unless-stopped
    ports:
      - "8083:8083"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://payflow-config:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: payflow-kafka:9092

  gateway-service:
    image: payflow-gateway
    container_name: payflow-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://payflow-config:8888

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: payflow-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "12182:2181"

    healthcheck:
      test: ["CMD", "bash", "-c", "echo rst | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: payflow-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: payflow-zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://payflow-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 10

  notification-service:
    image: payflow-notification
    container_name: payflow-notification
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://payflow-config:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: payflow-kafka:9092

  saga-service:
    image: payflow-saga
    container_name: payflow-saga

    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

    ports:
      - "8086:8086"

    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://payflow-config:8888

volumes:
  mysql-data: